# 构建 VitePress 文档站并部署到 GitHub Pages
name: Deploy docs to Pages

on:
  # 推送到默认分支且改动影响文档时触发（排除 test、配置、版本号等无关变更，避免无谓的重新部署）
  push:
    branches: [main]
    paths:
      - src/**          # typedoc 从源码生成 API
      - docs/**         # vitepress 内容与配置
      - typedoc.json
      - .github/workflows/page.yml   # 部署流程本身变更时也重跑
  # 允许在 Actions 页面手动触发
  workflow_dispatch:

# 授予 GITHUB_TOKEN 部署 Pages 所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 仅允许一个并发部署，跳过排队中的运行，但不取消进行中的运行
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
